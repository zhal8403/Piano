<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Wireless Piano</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Wireless Piano</h1>

        <div id="status">Connecting...</div>

        <div id="keyboard">

            <div class="key" id="key1">
                <div class="note">C</div>
            </div>

            <div class="key" id="key2">
                <div class="note">D</div>
            </div>

            <div class="key" id="key3">
                <div class="note">E</div>
            </div>

            <div class="key" id="key4">
                <div class="note">F</div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
