<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Wireless Piano</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Wireless Piano</h1>

        <div id="status">Connecting...</div>

        <div id="keyboard">

            <div id="whiteKey">
                <div class="key white" id="key1">
                    <div class="note">C</div>
                </div>

                <div class="key white" id="key3">
                    <div class="note">D</div>
                </div>

                <div class="key white" id="key5">
                    <div class="note">E</div>
                </div>

                <div class="key white" id="key6">
                    <div class="note">F</div>
                </div>

                <div class="key white" id="key8">
                    <div class="note">G</div>
                </div>

                <div class="key white" id="key10">
                    <div class="note">A</div>
                </div>

                <div class="key white" id="key12">
                    <div class="note">B</div>
                </div>
            </div>

            <div id="blackKey">
                <div class="key black" id="key2">
                    <div class="note">C#</div>
                </div>

                <div class="key black" id="key4">
                    <div class="note">D#</div>
                </div>

                <div class="spacer"></div>

                <div class="key black" id="key7">
                    <div class="note">F#</div>
                </div>

                <div class="key black" id="key9">
                    <div class="note">G#</div>
                </div>

                <div class="key black" id="key11">
                    <div class="note">A#</div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
